services:
  mongodb:
    image: mongo:7
    container_name: quizzconnect-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: QuizzConnect
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: quizzconnect-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quizzconnect-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 2000
      MONGODB_URI: mongodb://mongodb:27017/QuizzConnect
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3221
    env_file:
      - ./backend/.env.local
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:2000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quizzconnect-web
    restart: unless-stopped
    ports:
      - "3221:80"
    depends_on:
      - app

volumes:
  mongo_data:
  redis_data:
