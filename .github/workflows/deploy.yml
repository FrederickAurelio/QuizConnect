# Build on GitHub, push to GHCR, then deploy to VPS (pull + up).
# Secrets: VPS_HOST, SSH_USER, SSH_PRIVATE_KEY.
# GITHUB_TOKEN is automatic; no extra secret for GHCR push.

name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image owner (lowercase for Docker)
        id: meta
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/quizgame-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/quizgame-web:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set image owner
        id: meta
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/QuizzConnect
            git pull origin main
            export IMAGE_BACKEND=ghcr.io/${{ steps.meta.outputs.owner }}/quizgame-backend:latest
            export IMAGE_WEB=ghcr.io/${{ steps.meta.outputs.owner }}/quizgame-web:latest
            docker compose -f docker-compose.yml -f docker-compose.ci.yml pull
            docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
