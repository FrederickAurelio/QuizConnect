name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 3h
          script: |
            set -e
            cd ~/QuizConnect
            git fetch origin
            git reset --hard origin/main

            # Keep previous generation for one-step rollback (latest → previous).
            for img in quizconnect-app quizconnect-web; do
              if docker image inspect "${img}:latest" >/dev/null 2>&1; then
                docker tag "${img}:latest" "${img}:previous"
              fi
            done

            docker compose -f docker-compose.yml up -d --build

            # Drop any extra tags beyond latest/previous, then prune junk.
            for img in quizconnect-app quizconnect-web; do
              docker images --format '{{.Repository}}:{{.Tag}}' "$img" | while read -r ref; do
                case "$ref" in
                  *:latest|*:previous) ;;
                  *) docker rmi "$ref" || true ;;
                esac
              done
            done
            docker image prune -f
            docker container prune -f
            docker builder prune -f --keep-storage 2GB
